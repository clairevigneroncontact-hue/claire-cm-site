  <text x="100" y="290" font-family="Georgia,serif" font-size="52" fill="#2C2416">Instagram pour</text>
  <text x="100" y="355" font-family="Georgia,serif" font-size="52" fill="#8B3E22" font-style="italic">artisans &amp; indépendants.</text>
  <!-- Description -->
